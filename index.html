<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Concursos</title>

  <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe,#43e97b);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
}

h2{
    text-align:center;
    color:white;
    margin-bottom:20px;
    font-size:32px;
    text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

form{
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.3);
    max-width:550px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

label{
    display:block;
    margin-bottom:8px;
    color:#fff;
    font-weight:bold;
}

input[type="text"],
select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:18px;
    background:#ffffffdd;
    font-size:15px;
    transition:.3s;
}

input[type="text"]:focus,
select:focus{
    outline:none;
    transform:scale(1.02);
    box-shadow:0 0 10px #00f2fe;
}

.checkbox-group{
    display:flex;
    gap:20px;
    margin-bottom:20px;
    color:white;
}

.checkbox-group label{
    font-weight:normal;
}

input[type="checkbox"]{
    transform:scale(1.2);
    accent-color:#ff9800;
    margin-right:5px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff9800,#ff4081);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(0,0,0,.3);
}

.error{
    background:#ffebee;
    color:#c62828;
    border-left:6px solid #f44336;
    max-width:550px;
    margin:15px auto;
    padding:15px;
    border-radius:12px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.success{
    background:#e8f5e9;
    color:#2e7d32;
    border-left:6px solid #4caf50;
    max-width:550px;
    margin:15px auto;
    padding:15px;
    border-radius:12px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<h2>Registro Concurso de Programación</h2>
<h3>Grupo 4 Puetate Jonathan, Morales Elkin, Guaman Danny, Moreno Wilian</h3>

<div id="mensaje-error" class="error"></div>
<div id="mensaje-exito" class="success"></div>

<form id="formularioConcurso" onsubmit="validarFormulario(event)">

  <label>Nombre completo:</label>
  <input type="text" id="nombre" name="nombre">

  <label>Lenguajes:</label>
  <input type="checkbox" name="lenguaje" value="Java"> Java
  <input type="checkbox" name="lenguaje" value="Python"> Python
  <input type="checkbox" name="lenguaje" value="C++"> C++

  <br><br>

  <label>Nivel:</label>
  <select id="nivel" name="nivel">
    <option value="">Seleccione...</option>
    <option value="Principiante">Principiante</option>
    <option value="Intermedio">Intermedio</option>
    <option value="Avanzado">Avanzado</option>
  </select>

  <label>Correo institucional:</label>
  <input type="text" id="correo" name="correo">

  <label>Código:</label>
  <input type="text" id="codigo" name="codigo">

  <button type="submit">Enviar</button>

</form>

<script>
function validarFormulario(event) {
    event.preventDefault(); // Detiene el envío clásico de PHP

    const divError = document.getElementById("mensaje-error");
    const divExito = document.getElementById("mensaje-exito");
    
    // Limpieza inicial
    divError.style.display = "none";
    divError.innerHTML = "";
    divExito.style.display = "none";
    divExito.innerHTML = "";

    let errores = [];

    // Captura de datos
    const nombre = document.getElementById("nombre").value.trim();
    const nivel = document.getElementById("nivel").value;
    const correo = document.getElementById("correo").value.trim();
    const codigo = document.getElementById("codigo").value.trim();

    // Captura de checkboxes
    const checkboxes = document.querySelectorAll('input[name="lenguaje"]:checked');
    let lenguajes = [];
    checkboxes.forEach((cb) => {
        lenguajes.push(cb.value);
    });

    // --- VALIDACIONES ---

    // 1. Nombre
    const regexNombre = /^[A-Za-zÁÉÍÓÚáéíóúñÑ ]+$/;
    if (nombre.length < 6 || !regexNombre.test(nombre)) {
        errores.push("El nombre debe tener mínimo 6 caracteres y solo letras.");
    }

    // 2. Lenguajes
    if (lenguajes.length === 0) {
        errores.push("Debe seleccionar al menos un lenguaje.");
    }

    // 3. Nivel
    if (nivel === "") {
        errores.push("Debe seleccionar un nivel de experiencia.");
    }

    // 4. Correo institucional
    const regexCorreo = /@estudiante\.edu\.ec$/;
    if (!regexCorreo.test(correo)) {
        errores.push("El correo debe terminar en @estudiante.edu.ec.");
    }

    // 5. Código
    const regexCodigo = /^[A-Za-z0-9]{8}$/;
    if (!regexCodigo.test(codigo)) {
        errores.push("El código debe tener exactamente 8 caracteres alfanuméricos.");
    }

    // --- RENDERIZAR RESULTADO ---
    if (errores.length > 0) {
        let listaErrores = "<b>Errores:</b><ul>";
        errores.forEach((error) => {
            listaErrores += `<li>${error}</li>`;
        });
        listaErrores += "</ul>";
        
        divError.innerHTML = listaErrores;
        divError.style.display = "block";
    } else {
        divExito.innerHTML = `
            <b>Registro exitoso 🎉</b><br><br>
            Nombre: ${nombre}<br>
            Nivel: ${nivel}<br>
            Correo: ${correo}<br>
            Código: ${codigo}<br>
            Lenguajes: ${lenguajes.join(", ")}
        `;
        divExito.style.display = "block";
        document.getElementById("formularioConcurso").reset();
    }
}
</script>

</body>
</html>
