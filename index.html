<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Concursos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    form {
      background: white;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    label {
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 5px;
    }

    button {
      background-color: #2d89ef;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1b5fbf;
    }

    /* MENSAJE DE ERROR */
    .error {
      background: #ffe5e5;
      color: #b30000;
      padding: 10px;
      border-left: 5px solid red;
      max-width: 500px;
      margin: 10px auto;
      border-radius: 5px;
      display: none;
    }

    /* MENSAJE DE ÉXITO */
    .success {
      background: #e6ffea;
      color: #1b7f2a;
      padding: 10px;
      border-left: 5px solid green;
      max-width: 500px;
      margin: 10px auto;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>

<body>

<h2>Registro Concurso de Programación</h2>

<div id="mensaje-error" class="error"></div>
<div id="mensaje-exito" class="success"></div>

<form id="formularioConcurso" onsubmit="validarFormulario(event)">

  <label>Nombre completo:</label>
  <input type="text" id="nombre" name="nombre">

  <label>Lenguajes:</label>
  <input type="checkbox" name="lenguaje" value="Java"> Java
  <input type="checkbox" name="lenguaje" value="Python"> Python
  <input type="checkbox" name="lenguaje" value="C++"> C++

  <br><br>

  <label>Nivel:</label>
  <select id="nivel" name="nivel">
    <option value="">Seleccione...</option>
    <option value="Principiante">Principiante</option>
    <option value="Intermedio">Intermedio</option>
    <option value="Avanzado">Avanzado</option>
  </select>

  <label>Correo institucional:</label>
  <input type="text" id="correo" name="correo">

  <label>Código:</label>
  <input type="text" id="codigo" name="codigo">

  <button type="submit">Enviar</button>

</form>

<script>
function validarFormulario(event) {
    event.preventDefault(); // Detiene el envío clásico de PHP

    const divError = document.getElementById("mensaje-error");
    const divExito = document.getElementById("mensaje-exito");
    
    // Limpieza inicial
    divError.style.display = "none";
    divError.innerHTML = "";
    divExito.style.display = "none";
    divExito.innerHTML = "";

    let errores = [];

    // Captura de datos
    const nombre = document.getElementById("nombre").value.trim();
    const nivel = document.getElementById("nivel").value;
    const correo = document.getElementById("correo").value.trim();
    const codigo = document.getElementById("codigo").value.trim();

    // Captura de checkboxes
    const checkboxes = document.querySelectorAll('input[name="lenguaje"]:checked');
    let lenguajes = [];
    checkboxes.forEach((cb) => {
        lenguajes.push(cb.value);
    });

    // --- VALIDACIONES ---

    // 1. Nombre
    const regexNombre = /^[A-Za-zÁÉÍÓÚáéíóúñÑ ]+$/;
    if (nombre.length < 6 || !regexNombre.test(nombre)) {
        errores.push("El nombre debe tener mínimo 6 caracteres y solo letras.");
    }

    // 2. Lenguajes
    if (lenguajes.length === 0) {
        errores.push("Debe seleccionar al menos un lenguaje.");
    }

    // 3. Nivel
    if (nivel === "") {
        errores.push("Debe seleccionar un nivel de experiencia.");
    }

    // 4. Correo institucional
    const regexCorreo = /@estudiante\.edu\.ec$/;
    if (!regexCorreo.test(correo)) {
        errores.push("El correo debe terminar en @estudiante.edu.ec.");
    }

    // 5. Código
    const regexCodigo = /^[A-Za-z0-9]{8}$/;
    if (!regexCodigo.test(codigo)) {
        errores.push("El código debe tener exactamente 8 caracteres alfanuméricos.");
    }

    // --- RENDERIZAR RESULTADO ---
    if (errores.length > 0) {
        let listaErrores = "<b>Errores:</b><ul>";
        errores.forEach((error) => {
            listaErrores += `<li>${error}</li>`;
        });
        listaErrores += "</ul>";
        
        divError.innerHTML = listaErrores;
        divError.style.display = "block";
    } else {
        divExito.innerHTML = `
            <b>Registro exitoso 🎉</b><br><br>
            Nombre: ${nombre}<br>
            Nivel: ${nivel}<br>
            Correo: ${correo}<br>
            Código: ${codigo}<br>
            Lenguajes: ${lenguajes.join(", ")}
        `;
        divExito.style.display = "block";
        document.getElementById("formularioConcurso").reset();
    }
}
</script>

</body>
</html>
